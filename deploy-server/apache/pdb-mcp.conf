<VirtualHost *:80>
    ProxyPreserveHost On
    ProxyTimeout 330

    # Health check
    ProxyPass        /mcp/health http://127.0.0.1:8000/health
    ProxyPassReverse /mcp/health http://127.0.0.1:8000/health

    # Saved Excel downloads
    ProxyPass        /mcp/files/ http://127.0.0.1:8000/files/
    ProxyPassReverse /mcp/files/ http://127.0.0.1:8000/files/

    # Legacy HTTP+SSE transport
    ProxyPass        /mcp/sse http://127.0.0.1:8000/sse flushpackets=on
    ProxyPassReverse /mcp/sse http://127.0.0.1:8000/sse
    ProxyPass        /mcp/messages/ http://127.0.0.1:8000/messages/
    ProxyPassReverse /mcp/messages/ http://127.0.0.1:8000/messages/

    # Preferred Streamable HTTP transport
    ProxyPass        /mcp http://127.0.0.1:8000/mcp
    ProxyPassReverse /mcp http://127.0.0.1:8000/mcp

    # Streaming 안정화
    SetEnv proxy-nokeepalive 1
    SetEnv proxy-initial-not-pooled 1

    # 사내망 IP 대역만 허용 (실제 대역으로 교체 필요)
    <LocationMatch "^/mcp(/|$)">
        Require ip 192.168.0.0/16
    </LocationMatch>
</VirtualHost>
