version: "3.9"

services:
  pdb-mcp:
    image: pdb-mcp-server:node05
    container_name: pdb-mcp-server
    restart: unless-stopped

    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      PDB_MCP_HTTP_PATH: /mcp
      PDB_MCP_PUBLIC_PREFIX: /mcp
      PDB_MCP_OUTPUT_DIR: /app/outputs
      # Apache/도메인 배포 후 실제 접속 URL로 바꾸면 Excel 저장 결과가 다운로드 링크로 표시됩니다.
      # 예: http://node05.company/mcp 또는 https://node05.company/mcp
      # PDB_MCP_PUBLIC_BASE_URL: http://127.0.0.1:8000

    ports:
      - "127.0.0.1:8000:8000"  # 로컬 바인딩 — Apache가 프록시 처리

    command:
      - python
      - -m
      - server
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --http-path
      - /mcp
      - --public-prefix
      - /mcp

    volumes:
      - pdb_outputs:/app/outputs
      - pdb_logs:/app/logs

    networks:
      - mcp_net

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pdb_outputs:
  pdb_logs:

networks:
  mcp_net:
    driver: bridge
